<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بوابة السيلز</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    :root {
      --bg: #f0f2f5;
      --white: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --primary-light: #dbeafe;
      --success: #16a34a;
      --success-light: #dcfce7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --warning: #d97706;
      --warning-light: #fef3c7;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow: 0 4px 16px rgba(0,0,0,.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.14);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
      padding: 20px;
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
    }

    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon {
      width: 60px; height: 60px;
      background: var(--primary-light);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 12px;
    }
    .login-logo h1 { font-size: 20px; font-weight: 700; }
    .login-logo p  { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .field input {
      width: 100%; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 11px 14px;
      font-size: 14px; font-family: 'Cairo', sans-serif;
      background: #f8fafc; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: var(--primary); background: var(--white);
      box-shadow: 0 0 0 3px rgba(29,78,216,.1);
    }

    .btn-login {
      width: 100%; background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius-sm); padding: 13px;
      font-size: 15px; font-weight: 700; font-family: 'Cairo', sans-serif;
      cursor: pointer; transition: background .2s; margin-top: 4px;
    }
    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

    .login-error {
      background: var(--danger-light); color: var(--danger);
      border-radius: var(--radius-sm); padding: 10px 14px;
      font-size: 13px; font-weight: 600; margin-top: 12px;
      display: none; text-align: center;
    }

    #appScreen { display: none; }

    .topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
    }
    .topbar-brand {
      font-size: 16px; font-weight: 700; color: var(--primary);
      display: flex; align-items: center; gap: 8px;
    }
    .user-badge {
      background: var(--primary-light); color: var(--primary);
      border-radius: 20px; padding: 5px 14px;
      font-size: 13px; font-weight: 700;
    }
    .btn-logout {
      background: none; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 14px;
      font-size: 12px; font-family: 'Cairo', sans-serif;
      cursor: pointer; color: var(--muted); transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .main-content { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--white); border-radius: var(--radius);
      padding: 18px 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 900; line-height: 1; }
    .stat-value.blue  { color: var(--primary); }
    .stat-value.green { color: var(--success); }
    .stat-value.warn  { color: var(--warning); }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title { font-size: 15px; font-weight: 700; }
    .section-hint { font-size: 12px; color: var(--muted); }

    .types-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }

    .type-card {
      background: var(--white); border-radius: var(--radius);
      border: 2px solid var(--border); padding: 22px 20px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s, border-color .2s, transform .15s;
      cursor: pointer; position: relative;
    }
    .type-card:hover { box-shadow: var(--shadow); border-color: #93c5fd; transform: translateY(-2px); }
    .type-card.active { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(29,78,216,.12); transform: translateY(-2px); }

    .type-name { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
    .type-pending-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
    .type-count { font-size: 48px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 6px; }
    .type-sub { font-size: 12px; color: var(--muted); font-weight: 600; }

    .type-bar { height: 5px; background: #e2e8f0; border-radius: 4px; margin-top: 14px; overflow: hidden; }
    .type-bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .4s ease; }

    .type-card.active::after {
      content: '✓ محدد';
      position: absolute; top: 12px; left: 14px;
      background: var(--primary); color: #fff;
      border-radius: 20px; padding: 2px 10px;
      font-size: 11px; font-weight: 700;
    }

    .no-types-msg {
      background: var(--white); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 40px;
      text-align: center; color: var(--muted); font-size: 14px;
    }

    .panel {
      background: var(--white); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      overflow: hidden; margin-bottom: 16px;
    }
    .panel-head {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }
    .panel-title { font-size: 14px; font-weight: 700; }
    .panel-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .btn {
      border: none; border-radius: var(--radius-sm);
      padding: 8px 16px; font-size: 13px; font-weight: 700;
      font-family: 'Cairo', sans-serif; cursor: pointer;
      transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-ghost { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-success:disabled { background: #94a3b8; cursor: not-allowed; }

    .numbers-wrap { max-height: 400px; overflow-y: auto; }

    .numbers-table { width: 100%; border-collapse: collapse; }
    .numbers-table th {
      background: #f8fafc; padding: 10px 16px;
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-align: right; border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
    }
    .numbers-table td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
    .numbers-table tr:last-child td { border-bottom: none; }
    .numbers-table tr:hover td { background: #f8fafc; }

    .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .tag-voda     { background: #fee2e2; color: #dc2626; }
    .tag-orange   { background: #fff7ed; color: #ea580c; }
    .tag-etisalat { background: #f0fdf4; color: #16a34a; }
    .tag-we       { background: #eff6ff; color: #2563eb; }
    .tag-other    { background: #f1f5f9; color: #64748b; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; font-weight: 600; }
    .empty-state small { font-size: 12px; display: block; margin-top: 4px; }

    .send-section {
      padding: 16px 18px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; background: #f8fafc; flex-wrap: wrap;
    }
    .send-info { font-size: 13px; color: var(--muted); }
    .send-info strong { color: var(--text); font-size: 16px; }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text); color: #fff;
      padding: 12px 24px; border-radius: 30px;
      font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg);
      transition: transform .3s ease; z-index: 9999; white-space: nowrap;
    }
    #toast.show   { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }

    .loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(255,255,255,.75); z-index: 500;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    .loading-overlay.show { display: flex; }
    .dot-spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--primary-light);
      border-top-color: var(--primary);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    .loading-overlay p { font-size: 13px; font-weight: 600; color: var(--primary); }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-card:last-child { grid-column: span 2; }
      .types-grid { grid-template-columns: 1fr 1fr; }
      .login-card { padding: 28px 20px; }
      .type-count { font-size: 38px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">📊</div>
      <h1>بوابة السيلز</h1>
      <p>سجّل دخولك لعرض الأرقام المتبقية</p>
    </div>
    <div class="field">
      <label>اسم السيلز</label>
      <input type="text" id="inputName" placeholder="ادخل اسمك"/>
    </div>
    <div class="field">
      <label>الباسورد</label>
      <input type="password" id="inputPassword" placeholder="••••••••"/>
    </div>
    <button class="btn-login" id="btnLogin">دخول</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-brand">
      <span>📊</span>
      <span>بوابة السيلز</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="user-badge" id="userBadge">—</div>
      <button class="btn-logout" id="btnLogout">خروج</button>
    </div>
  </div>

  <div class="main-content">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">إجمالي أرقامي</div>
        <div class="stat-value blue" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">تم الإرسال لـ Odoo</div>
        <div class="stat-value green" id="statSent">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">لم يُرسل بعد</div>
        <div class="stat-value warn" id="statPending">0</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">الداتا المتاحة للإرسال</div>
      <div class="section-hint" id="typesHint"></div>
    </div>
    <div class="types-grid" id="typesGrid"></div>

    <div class="panel" id="numbersPanel" style="display:none">
      <div class="panel-head">
        <div>
          <div class="panel-title" id="panelTitle">الأرقام المتبقية</div>
          <div class="panel-subtitle" id="panelSubtitle"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost" id="btnRefresh">🔄 تحديث</button>
          <button class="btn btn-success" id="btnSendOdoo" disabled>✈️ إرسال</button>
        </div>
      </div>
      <div class="numbers-wrap">
        <table class="numbers-table">
          <thead>
            <tr>
              <th>#</th>
              <th>الرقم</th>
              <th>الشبكة</th>
            </tr>
          </thead>
          <tbody id="numbersBody"></tbody>
        </table>
      </div>
      <div class="send-section">
        <div class="send-info">متبقي: <strong id="pendingCount">0</strong> رقم</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;">
            <label style="font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap">عايز كام رقم؟</label>
            <input type="number" id="sendQty" min="1" placeholder="الكل"
              style="width:80px;border:none;outline:none;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;color:var(--primary);text-align:center;background:transparent"/>
          </div>
          <button class="btn btn-success" id="btnSendOdoo2" disabled>✈️ إرسال</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="dot-spinner"></div>
  <p id="loadingText">جارٍ التحميل...</p>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://fyjiizuumgoeuxppdect.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5amlpenV1bWdvZXV4cHBkZWN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTg4MjgsImV4cCI6MjA5NDY5NDgyOH0.M8BvjRYszipT-JNOMwcOhQkWT2g8yTLXHuAeuuMscbs';
const WORKER_URL   = 'https://odoo-proxy2.lapmozmen.workers.dev';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $  = id => document.getElementById(id);

let currentUser = null;
let allNumbers  = [];
let activeType  = null;

function getCompany(num) {
  if (/^2010/.test(num)) return 'فودافون';
  if (/^2011/.test(num)) return 'اتصالات';
  if (/^2012/.test(num)) return 'أورانج';
  if (/^2015/.test(num)) return 'WE';
  return 'أخرى';
}

function companyTag(c) {
  const map = { 'فودافون':'tag-voda','أورانج':'tag-orange','اتصالات':'tag-etisalat','WE':'tag-we','أخرى':'tag-other' };
  return `<span class="tag ${map[c]||'tag-other'}">${c}</span>`;
}

function formatPhone(num) {
  const m = num.match(/^20(\d{3})(\d{3})(\d{4})$/);
  return m ? `+20 ${m[1]} ${m[2]} ${m[3]}` : '+' + num;
}

function showToast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3200);
}

function showLoading(txt = 'جارٍ التحميل...') {
  $('loadingText').textContent = txt;
  $('loadingOverlay').classList.add('show');
}

function hideLoading() {
  $('loadingOverlay').classList.remove('show');
}

async function doLogin() {
  const name = $('inputName').value.trim();
  const pass  = $('inputPassword').value.trim();
  if (!name || !pass) { showErr('ادخل الاسم والباسورد'); return; }

  $('btnLogin').disabled = true;
  $('btnLogin').textContent = 'جارٍ التحقق...';
  $('loginError').style.display = 'none';

  const { data, error } = await sb
    .from('sales')
    .select('name, password')
    .eq('name', name)
    .single();

  $('btnLogin').disabled = false;
  $('btnLogin').textContent = 'دخول';

  if (error || !data) { showErr('الاسم غير موجود'); return; }
  if (String(data.password) !== String(pass)) { showErr('الباسورد غلط'); return; }

  currentUser = { name: data.name };
  enterApp();
}

function showErr(msg) {
  $('loginError').textContent = msg;
  $('loginError').style.display = 'block';
}

function enterApp() {
  $('loginScreen').style.display = 'none';
  $('appScreen').style.display   = 'block';
  $('userBadge').textContent = currentUser.name;
  loadData();
}

async function loadData() {
  showLoading('جارٍ تحميل الأرقام المتبقية...');

  const { data, error } = await sb
    .from('numbers')
    .select('number, data_type')
    .eq('distributed', false);

  hideLoading();

  if (error) {
    showToast('فشل تحميل البيانات', 'error');
    console.error(error);
    return;
  }

  allNumbers = data || [];
  renderStats();
  renderTypes();
  if (activeType) {
    const stillHas = allNumbers.some(r => (r.data_type || 'غير محدد') === activeType);
    if (stillHas) {
      showNumbers(activeType);
    } else {
      activeType = null;
      $('numbersPanel').style.display = 'none';
    }
  }
}

function renderStats() {
  const pending = allNumbers.length;
  $('statTotal').textContent   = pending;
  $('statSent').textContent    = '—';
  $('statPending').textContent = pending;
}

function renderTypes() {
  const grid = $('typesGrid');
  const map = {};
  for (const r of allNumbers) {
    const t = r.data_type || 'غير محدد';
    map[t] = (map[t] || 0) + 1;
  }
  const types = Object.entries(map);
  $('typesHint').textContent = types.length ? `${types.length} نوع متاح` : '';

  if (!types.length) {
    grid.innerHTML = `
      <div class="no-types-msg">
        <div style="font-size:40px;margin-bottom:12px">🎉</div>
        <div style="font-weight:700;font-size:15px;margin-bottom:6px">تم إرسال كل الأرقام!</div>
        <div style="font-size:13px;color:var(--muted)">لا يوجد أرقام متبقية للإرسال</div>
      </div>`;
    return;
  }

  grid.innerHTML = types.map(([name, count]) => `
    <div class="type-card ${activeType === name ? 'active' : ''}" data-type="${name}">
      <div class="type-name">${name}</div>
      <div class="type-pending-label">رقم متبقي</div>
      <div class="type-count">${count}</div>
      <div class="type-sub">متبقي للإرسال</div>
    </div>`).join('');

  grid.querySelectorAll('.type-card').forEach(card => {
    card.addEventListener('click', () => {
      activeType = card.dataset.type;
      grid.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      showNumbers(activeType);
    });
  });
}

function showNumbers(typeName) {
  const pending = allNumbers.filter(r => (r.data_type || 'غير محدد') === typeName);
  $('numbersPanel').style.display = 'block';
  $('panelTitle').textContent = `الأرقام المتبقية — ${typeName}`;
  $('panelSubtitle').textContent = `${pending.length} رقم متبقي للإرسال`;
  $('pendingCount').textContent = pending.length;
  $('btnSendOdoo').disabled  = pending.length === 0;
  $('btnSendOdoo2').disabled = pending.length === 0;

  const body = $('numbersBody');
  if (!pending.length) {
    body.innerHTML = `
      <tr><td colspan="3">
        <div class="empty-state">
          <div class="emoji">✅</div>
          <p>كل أرقام هذا النوع تم إرسالها</p>
          <small>اختر نوع آخر من الأعلى</small>
        </div>
      </td></tr>`;
    return;
  }

  body.innerHTML = pending.map((r, i) => `
    <tr>
      <td style="color:var(--muted);font-size:12px">${i + 1}</td>
      <td style="font-family:monospace;font-size:13px">${formatPhone(r.number)}</td>
      <td>${companyTag(getCompany(r.number))}</td>
    </tr>
  `).join('');
}

async function sendToOdoo() {
  let pool = activeType
    ? allNumbers.filter(r => (r.data_type || 'غير محدد') === activeType)
    : [...allNumbers];

  if (!pool.length) { showToast('كل الأرقام تم إرسالها بالفعل'); return; }

  const qtyInput = $('sendQty');
  const qty = qtyInput ? parseInt(qtyInput.value) : NaN;
  const source = (!isNaN(qty) && qty > 0) ? pool.slice(0, qty) : pool;

  if (source.length === 0) { showToast('ادخل عدد صحيح'); return; }

  showLoading(`جارٍ إرسال ${source.length} رقم لـ Odoo...`);
  if ($('sendQty')) $('sendQty').value = '';
  $('btnSendOdoo').disabled  = true;
  $('btnSendOdoo2').disabled = true;

  const leads = source.map(r => ({
    phone:       r.number,
    name:        formatPhone(r.number),
    data_type:   r.data_type || '',
    salesperson: currentUser.name,  // ✅ اسم الـ user اللي فاتح البورتال
  }));

  try {
    const res = await fetch(`${WORKER_URL}/send-leads`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: 'khalidahmmed209@gmail.com',  // ✅ account خالد دايماً للـ authenticate
        password: '123',
        leads,
      }),
    });

    const result = await res.json();
    hideLoading();

    if (!res.ok || !result.success) {
      showToast(result.error || 'فشل الإرسال', 'error');
      $('btnSendOdoo').disabled  = false;
      $('btnSendOdoo2').disabled = false;
      return;
    }

    const nums = source.map(r => r.number);
    await sb.from('numbers').update({ odoo_sent: true, distributed: true, distributed_at: new Date().toISOString() }).in('number', nums);

    allNumbers = allNumbers.filter(r => !nums.includes(r.number));

    showToast(`✅ تم إرسال ${result.created} رقم`, 'success');
    renderStats();
    renderTypes();
    if (activeType) showNumbers(activeType);

  } catch (err) {
    hideLoading();
    showToast('خطأ: ' + err.message, 'error');
    $('btnSendOdoo').disabled  = false;
    $('btnSendOdoo2').disabled = false;
  }
}

$('btnLogin').addEventListener('click', doLogin);
$('inputPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('inputName').addEventListener('keydown', e => { if (e.key === 'Enter') $('inputPassword').focus(); });

$('btnLogout').addEventListener('click', () => {
  currentUser = null; allNumbers = []; activeType = null;
  $('appScreen').style.display    = 'none';
  $('loginScreen').style.display  = 'flex';
  $('numbersPanel').style.display = 'none';
  $('inputName').value = ''; $('inputPassword').value = '';
  $('loginError').style.display = 'none';
});

$('btnRefresh').addEventListener('click', loadData);
$('btnSendOdoo').addEventListener('click', sendToOdoo);
$('btnSendOdoo2').addEventListener('click', sendToOdoo);
</script>
</body>
</html>
